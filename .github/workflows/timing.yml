name: timing

on: workflow_dispatch

jobs:
  run-timings:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Install xsimd 14.1.0 and run the timing programs.
      run: |
        g++ -v
        echo "--------------------------------------"
        git clone https://github.com/xtensor-stack/xsimd.git
        cd xsimd
        git checkout -q "14.1.0"
        cd ..
        export XSIMD_INCLUDE=$(pwd)/xsimd/include
        cd timing
        echo "--------------------------------------"
        bash run_timing.sh
